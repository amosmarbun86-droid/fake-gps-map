<!DOCTYPE html>
<html>
<head>
<title>Fake GPS Map Final</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="manifest" href="manifest.json"/>
<style>
body{font-family:Arial;text-align:center;}
#map{height:500px;margin-top:10px;}
button{padding:10px;margin:5px;}
#joystick{position:fixed;bottom:30px;left:30px;width:120px;height:120px;}
</style>
</head>
<body>

<h2>Fake GPS Map Final</h2>

<input type="text" id="search" placeholder="Cari kota">
<button onclick="searchLocation()">Cari</button>
<button onclick="getLocation()">Use My Location</button>
<button onclick="saveLocation()">⭐ Simpan Lokasi</button>
<button onclick="walk()">🚶 Mulai Jalan</button>
<button onclick="stopWalk()">⏹ Stop Jalan</button>

<div id="map"></div>
<p>Latitude : <span id="lat"></span></p>
<p>Longitude : <span id="lng"></span></p>

<div id="joystick"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
<script src="script.js"></script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
